# Flatpak manifest for Flathub submission.
# See ../temp/flatpak-release-plan.md and
# https://docs.flathub.org/docs/for-app-authors/submission for the
# end-to-end process. This file plus the AppStream metainfo XML is
# what Flathub reviewers inspect.

app-id: io.github.hawwwran.flatpal
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: flatpal
# Match hwnhub's published branch (stable). Without this, flatpak-builder
# exports on its legacy default 'master' and the bundle/channel branches
# diverge — flatpak update then can't see new versions on the channel.
default-branch: stable

finish-args:
  # Standard graphical-app surface.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

  # Network: Flathub popularity API + screenshot CDN downloads.
  - --share=network

  # Read host Flatpak install metadata (icons, AppStream cache, per-app
  # metainfo XML). Narrower than --filesystem=host. Same precedent as
  # Flatseal — see PR description for the justification reviewers want.
  - --filesystem=/var/lib/flatpak:ro
  - --filesystem=xdg-data/flatpak:ro

  # Spawn host flatpak (list / ps / info / run / history) via
  # flatpak-spawn --host. Core purpose of the app.
  - --talk-name=org.freedesktop.Flatpak

  # Hand off install / uninstall / update to GNOME Software.
  - --talk-name=org.gnome.Software

modules:
  - name: flatpal
    buildsystem: meson
    sources:
      # Upstream stays tag-only (Option A in the release plan). The
      # tag+commit pinning that Flathub requires lives on the Flathub-managed
      # copy of this manifest, updated per release by tools/release-flatpal.sh
      # Mode 2.
      - type: git
        url: https://github.com/hawwwran/flatpal.git
        tag: v0.2.1
